<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />

    <!-- SEO -->
    <meta name="description" content="FORGE — App de gym tracking personal y para grupos de amigos. Armá rutinas según tu objetivo, registrá tus series y seguí tu progreso." />
    <meta name="author" content="FORGE" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FORGE" />
    <meta property="og:title" content="FORGE — Gym Tracker" />
    <meta property="og:description" content="Armá rutinas según tu objetivo, registrá tus series y seguí tu progreso." />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="FORGE — Gym Tracker" />
    <meta name="twitter:description" content="Armá rutinas según tu objetivo, registrá tus series y seguí tu progreso." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fuentes no bloqueantes: se cargan async (media=print → all on load) para
         no retrasar el First Contentful Paint en móvil. display=swap evita FOIT. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap"
      />
    </noscript>
    <title>FORGE — Gym Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
